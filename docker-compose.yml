version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: edefence_postgres
    environment:
      POSTGRES_USER: edefence
      POSTGRES_PASSWORD: edefence
      POSTGRES_DB: analyse_financiere
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edefence -d analyse_financiere"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: edefence_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edefence_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://edefence:edefence@postgres:5432/analyse_financiere
      DATABASE_SYNC_URL: postgresql://edefence:edefence@postgres:5432/analyse_financiere
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/tmp/edefence_uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edefence_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
